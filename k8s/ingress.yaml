apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retail-api-ingress
spec:
  ingressClassName: public
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: retail-api-service # Routes external traffic to this internal service
            port:
              number: 80
